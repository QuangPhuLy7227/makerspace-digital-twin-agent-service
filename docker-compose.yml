services:
  agent-service:
    build: .
    container_name: makerspace-digital-twin-agent-service
    ports:
      - "9000:9000"
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./data:/app/data
      - ./scripts:/app/scripts
    restart: unless-stopped